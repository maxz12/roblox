<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Lua Editor</title>
  <!-- CodeMirror core -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>

  <!-- Lua language support -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/lua/lua.min.js"></script>

  <!-- Dark theme base -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/material-darker.min.css">

  <!-- Add-ons for code editing improvements -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/matchbrackets.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/selection/active-line.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/hint/show-hint.js"></script>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #121212;
      color: #f0f0f0;
      font-family: 'Consolas', 'Monaco', monospace;
      overflow: hidden;
    }

    .editor-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #editor-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* Custom darker theme overrides */
    .CodeMirror {
      height: 100%;
      font-size: 16px;
      font-family: 'Consolas', 'Monaco', monospace;
      background-color: #141419 !important;
      color: #eaeaea !important;
      border: none;
      padding: 0;
      line-height: 1.6;
      letter-spacing: 0.3px;
    }

    /* Improved text selection */
    .CodeMirror-selected {
      background-color: rgba(128, 128, 255, 0.4) !important;
      border-radius: 2px;
    }

    .CodeMirror-selectedtext {
      color: #ffffff !important;
      text-shadow: 0 0 2px rgba(255, 255, 255, 0.3);
    }

    /* Fix scrollbar visibility */
    .CodeMirror-scroll {
      overflow: scroll !important;
    }

    /* Make cursor more visible */
    .CodeMirror-cursor {
      border-left: 2px solid #80cbc4 !important;
      transition: border-color 0.3s;
    }

    /* Line number styling */
    .CodeMirror-gutters {
      background: #121217 !important;
      border-right: 1px solid #252532 !important;
    }

    .CodeMirror-linenumber {
      color: #5a5a6a !important;
      font-size: 14px;
      padding: 0 8px;
      min-width: 36px;
      text-align: right;
    }

    /* Syntax highlighting refinements */
    .cm-s-material-darker .cm-keyword {
      color: #c792ea !important;
      font-weight: bold;
    }

    .cm-s-material-darker .cm-def {
      color: #82aaff !important;
    }

    .cm-s-material-darker .cm-string {
      color: #c3e88d !important;
    }

    .cm-s-material-darker .cm-number {
      color: #f78c6c !important;
    }

    .cm-s-material-darker .cm-comment {
      color: #616f7a !important;
      font-style: italic;
    }

    .cm-s-material-darker .cm-variable {
      color: #eeffff !important;
    }

    /* Enhanced active line highlighting */
    .CodeMirror-activeline-background {
      background: rgba(45, 50, 65, 0.6) !important;
      border-left: 1px solid #5a5aec;
    }

    /* Matching brackets highlight */
    .CodeMirror-matchingbracket {
      color: #82aaff !important;
      text-decoration: none !important;
      background: rgba(130, 170, 255, 0.3) !important;
      border-radius: 2px;
      font-weight: bold;
      box-shadow: 0 0 2px #82aaff;
      padding: 0 1px;
    }

    /* Improved scrollbar styling */
    .CodeMirror-vscrollbar,
    .CodeMirror-hscrollbar {
      width: 14px !important;
      height: 14px !important;
    }

    .CodeMirror-vscrollbar::-webkit-scrollbar,
    .CodeMirror-hscrollbar::-webkit-scrollbar {
      width: 14px;
      height: 14px;
    }

    .CodeMirror-vscrollbar::-webkit-scrollbar-track,
    .CodeMirror-hscrollbar::-webkit-scrollbar-track {
      background: #191923;
    }

    .CodeMirror-vscrollbar::-webkit-scrollbar-thumb,
    .CodeMirror-hscrollbar::-webkit-scrollbar-thumb {
      background: #363646;
      border-radius: 8px;
      border: 3px solid #191923;
    }

    .CodeMirror-vscrollbar::-webkit-scrollbar-thumb:hover,
    .CodeMirror-hscrollbar::-webkit-scrollbar-thumb:hover {
      background: #4a4a5a;
    }

    /* Minimal bottom bar */
    .bottom-bar {
      background-color: #1a1a21;
      color: #9090a0;
      padding: 6px 12px;
      font-size: 13px;
      border-top: 1px solid #252532;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Autocompletion popup */
    .CodeMirror-hints {
      position: absolute;
      z-index: 10;
      overflow: hidden;
      list-style: none;
      margin: 0;
      padding: 0;
      border-radius: 4px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      background-color: #1e1e25;
      color: #eaeaea;
      font-size: 14px;
      font-family: 'Consolas', 'Monaco', monospace;
      max-height: 250px;
      overflow-y: auto;
    }

    .CodeMirror-hint {
      margin: 0;
      padding: 6px 12px;
      white-space: pre;
      cursor: pointer;
      transition: background-color 0.1s;
    }

    .CodeMirror-hint-active {
      background-color: #4040aa;
      color: white;
    }
  </style>
</head>
<body>
  <div class="editor-container">
    <div id="editor-wrapper"></div>

    <div class="bottom-bar">
      <div>Lua</div>
      <div>Spaces: 4</div>
      <div id="line-counter">Line 1/1</div>
    </div>
  </div>

  <script>
    // Initialize editor
    const editorWrapper = document.getElementById('editor-wrapper');

    // Create a textarea for the editor
    const textarea = document.createElement('textarea');
    editorWrapper.appendChild(textarea);

    // Auto-correct configuration
    const autoCorrectMap = {
      // Regular mappings (no parentheses)
      'localplayer': 'LocalPlayer',
      'players': 'Players',
      'game': 'game',
      'getservice': 'GetService',
      'workspace': 'Workspace',
      'instance': 'Instance',
      'new': 'new',
      'vector3': 'Vector3',

      // Functions with parentheses that need cursor placement inside
      'getchildren': { text: 'GetChildren()', cursorOffset: 1 },
      'find': { text: 'Find()', cursorOffset: 1 },
      'findfirstchild': { text: 'FindFirstChild()', cursorOffset: 1 },
      'clone': { text: 'Clone()', cursorOffset: 1 },
      'destroy': { text: 'Destroy()', cursorOffset: 1 },
      'getplayers': { text: 'GetPlayers()', cursorOffset: 1 },
      'connect': { text: 'Connect()', cursorOffset: 1 },
      'fireserver': { text: 'FireServer()', cursorOffset: 1 },
      'invokeserver': { text: 'InvokeServer()', cursorOffset: 1 },
      'wait': { text: 'wait()', cursorOffset: 1 },
      'print': { text: 'print()', cursorOffset: 1 },
      'tostring': { text: 'tostring()', cursorOffset: 1 },
      'tonumber': { text: 'tonumber()', cursorOffset: 1 },
      'pairs': { text: 'pairs()', cursorOffset: 1 },
      'ipairs': { text: 'ipairs()', cursorOffset: 1 },
      'typeof': { text: 'typeof()', cursorOffset: 1 },
      'vector3new': { text: 'Vector3.new()', cursorOffset: 1 },
      'cframe': { text: 'CFrame.new()', cursorOffset: 1 }
    };

    // Create custom autocomplete function
    function customHint(cm, options) {
      const cursor = cm.getCursor();
      const line = cm.getLine(cursor.line);
      const word = getWordBeforeCursor(cm);

      if (!word) return null;

      const matches = [];
      const wordLower = word.toLowerCase();

      // Check for matches in our custom map
      for (const key in autoCorrectMap) {
        if (key.startsWith(wordLower)) {
          const value = autoCorrectMap[key];
          let displayText, text, cursorOffset;

          if (typeof value === 'object') {
            text = value.text;
            displayText = value.text;
            cursorOffset = value.cursorOffset;
          } else {
            text = value;
            displayText = value;
            cursorOffset = 0;
          }

          matches.push({
            text: text,
            displayText: displayText + ' (' + key + ')',
            from: {line: cursor.line, ch: cursor.ch - word.length},
            to: cursor,
            cursorOffset: cursorOffset
          });
        }
      }

      if (matches.length === 0) return null;

      return {
        list: matches,
        from: {line: cursor.line, ch: cursor.ch - word.length},
        to: cursor
      };
    }

    // Gets the word before the cursor
    function getWordBeforeCursor(cm) {
      const cursor = cm.getCursor();
      const line = cm.getLine(cursor.line);
      let start = cursor.ch;

      // Find the start of the word
      while (start > 0 && /[a-zA-Z0-9_]/.test(line.charAt(start - 1))) {
        start--;
      }

      if (start === cursor.ch) return null;

      return line.substring(start, cursor.ch);
    }

    // Initialize CodeMirror
    const editor = CodeMirror.fromTextArea(textarea, {
      mode: "lua",
      theme: "material-darker",
      lineNumbers: true,
      indentUnit: 4,
      smartIndent: true,
      indentWithTabs: false,
      lineWrapping: false,
      matchBrackets: true,
      autoCloseBrackets: true,
      styleActiveLine: true,
      scrollbarStyle: "native",
      extraKeys: {
        "Tab": function(cm) {
          // Check for autocomplete first
          const cursor = cm.getCursor();
          const word = getWordBeforeCursor(cm);

          if (word && word.toLowerCase() in autoCorrectMap) {
            const value = autoCorrectMap[word.toLowerCase()];
            let replacement, cursorOffset;

            if (typeof value === 'object') {
              replacement = value.text;
              cursorOffset = value.cursorOffset;
            } else {
              replacement = value;
              cursorOffset = 0;
            }

            // Replace with autocorrection
            cm.replaceRange(
              replacement,
              {line: cursor.line, ch: cursor.ch - word.length},
              cursor
            );

            // Calculate where to put the cursor after replacement
            if (cursorOffset) {
              // For functions with parentheses, put cursor inside the parentheses
              // Find the position of ()
              const parenPos = replacement.lastIndexOf("()");
              if (parenPos !== -1) {
                // Position cursor between the parentheses
                cm.setCursor({
                  line: cursor.line,
                  ch: cursor.ch - word.length + parenPos + 1  // +1 to get between the ()
                });
              }
            }

            return;
          }

          // Default Tab behavior - insert 4 spaces
          if (cm.somethingSelected()) {
            cm.indentSelection("add");
          } else {
            cm.replaceSelection("    ");
          }
        },
        "Backspace": handleBackspace,
        "Ctrl-Backspace": handleCtrlBackspace,
        "Cmd-Backspace": handleCtrlBackspace,
        "Ctrl-Space": function(cm) {
          // Show custom autocomplete
          const hint = customHint(cm);
          if (hint) {
            CodeMirror.showHint(cm, function() { return hint; }, {
              completeSingle: true,
              alignWithWord: true
            });
          }
        }
      }
    });

    // Custom hint completion handling to position cursor inside parentheses
    editor.on("hint-select", function(cm, data) {
      if (data && data.cursorOffset) {
        const parenPos = data.text.lastIndexOf("()");
        if (parenPos !== -1) {
          const cursor = editor.getCursor();
          // Position cursor between parentheses
          editor.setCursor({
            line: cursor.line,
            ch: cursor.ch - (data.text.length - parenPos) + 1
          });
        }
      }
    });

    // We also need to handle completion manually since hint-select might not trigger
    CodeMirror.on(editor.getWrapperElement(), "keyup", function(event) {
      if (event.key === "Tab" || event.key === "Enter") {
        const cursor = editor.getCursor();
        const line = editor.getLine(cursor.line);

        // Check if we just inserted a function with ()
        const beforeCursor = line.substring(0, cursor.ch);
        const matchParens = beforeCursor.match(/\w+\(\)$/);

        if (matchParens) {
          // There are empty parentheses right before cursor, move cursor between them
          editor.setCursor({
            line: cursor.line,
            ch: cursor.ch - 1  // Move one character left to get between ()
          });
        }
      }
    });

    // Handle hint selection
    editor.on("changes", function(cm, changes) {
      for (let i = 0; i < changes.length; i++) {
        const change = changes[i];
        // Check if this change was due to auto-completion
        if (change.origin === "complete") {
          const line = cm.getLine(change.from.line);
          const insertedText = line.substring(change.from.ch, change.from.ch + change.text[0].length);

          // If we inserted a function with (), move the cursor inside
          if (insertedText.endsWith("()")) {
            setTimeout(function() {
              const cursor = cm.getCursor();
              cm.setCursor({
                line: cursor.line,
                ch: change.from.ch + insertedText.length - 1
              });
            }, 0);
          }
        }
      }
    });

    // Make it fill the container
    editor.setSize("100%", "100%");

    // Set initial content
    editor.setValue(`-- Minimal Lua Editor
-- Try typing 'find' and press Tab to auto-correct
-- The cursor will be placed inside the parentheses: Find(*)

local Players = game:GetService("Players")

local function onPlayerJoin(player)
    -- Try typing 'print' and press Tab - cursor will go inside the parentheses
    print(player.Name .. " has joined the game!")

    -- Example: Try typing 'getchildren' and press Tab
    local children = player:GetChildren()

    -- Or try 'find' + Tab
    local part = workspace:Find()

    -- Create leaderstats
    local leaderstats = Instance.new("Folder")
    leaderstats.Name = "leaderstats"
    leaderstats.Parent = player

    -- Add a coins value
    local coins = Instance.new("IntValue")
    coins.Name = "Coins"
    coins.Value = 0
    coins.Parent = leaderstats
end

Players.PlayerAdded:Connect(onPlayerJoin)
`);

    // Line counter element
    const lineCounter = document.getElementById('line-counter');

    // Update line counter
    function updateLineCounter() {
      const totalLines = editor.lineCount();
      const currentLine = editor.getCursor().line + 1;
      lineCounter.textContent = `Line ${currentLine}/${totalLines}`;
    }

    // Special backspace handling to remove full indentation
    function handleBackspace(cm) {
      const cursor = cm.getCursor();
      const line = cm.getLine(cursor.line);
      const lineUpToCursor = line.substring(0, cursor.ch);

      // If we're at the start of a line with only whitespace before cursor
      if (cursor.ch > 0 && /^\s+$/.test(lineUpToCursor)) {
        // Delete the entire indentation at once
        cm.replaceRange("", {line: cursor.line, ch: 0}, {line: cursor.line, ch: cursor.ch});
        return;
      }

      // Default backspace behavior
      cm.deleteH(-1, "char");
    }

    // Handle Ctrl+Backspace to delete empty lines
    function handleCtrlBackspace(cm) {
      const cursor = cm.getCursor();
      const line = cm.getLine(cursor.line);

      // If line is empty or only whitespace, delete the whole line
      if (!line || line.trim() === "") {
        // Delete the entire line
        cm.replaceRange("",
          {line: cursor.line, ch: 0},
          {line: cursor.line + 1, ch: 0}
        );
        return;
      }

      // Otherwise delete word
      cm.deleteH(-1, "word");
    }

    // Check if a structure has a matching end
    function needsEndStatement(cm, lineNum, structureType) {
      // Get the indentation level of the current line
      const line = cm.getLine(lineNum);
      const indentLevel = line.search(/\S|$/);

      // Look ahead for a matching end at the same indentation level
      let openCount = 1;
      for (let i = lineNum + 1; i < cm.lineCount(); i++) {
        const checkLine = cm.getLine(i).trim();

        // Check for nested structures that increase the depth
        if (structureType === 'if' && /^\s*\bif\b/.test(checkLine)) {
          openCount++;
        } else if (structureType === 'for' && /^\s*\bfor\b/.test(checkLine)) {
          openCount++;
        } else if (structureType === 'while' && /^\s*\bwhile\b/.test(checkLine)) {
          openCount++;
        } else if (structureType === 'function' && /^\s*\bfunction\b/.test(checkLine)) {
          openCount++;
        }

        // Check for end statements that decrease the depth
        if (/^\s*\bend\b/.test(checkLine)) {
          openCount--;
          // If we've found a matching end, we don't need another one
          if (openCount === 0) {
            return false;
          }
        }
      }

      // If we get here, we need an end statement
      return true;
    }

    // Handle keypresses for Enter key to perform auto-completion and add end statements
    editor.on('keydown', function(cm, event) {
      if (event.key === 'Enter') {
        const cursor = cm.getCursor();
        const line = cm.getLine(cursor.line);
        const trimmedLine = line.trim();

        // Auto-complete control structures when Enter is pressed
        let addEnd = false;
        let indentLevel = line.search(/\S|$/);

        // Detect the type of structure to auto-complete
        let structureType = null;

        // Check for control structures
        if (/\bif\b/.test(trimmedLine)) {
          // Add 'then' if missing
          if (!/(then)\b/.test(trimmedLine)) {
            cm.replaceRange(" then", {line: cursor.line, ch: line.length});
          }
          structureType = "if";
          addEnd = needsEndStatement(cm, cursor.line, structureType);
        }
        else if (/\bfor\b/.test(trimmedLine)) {
          // Add 'do' if missing
          if (!/(do)\b/.test(trimmedLine)) {
            cm.replaceRange(" do", {line: cursor.line, ch: line.length});
          }
          structureType = "for";
          addEnd = needsEndStatement(cm, cursor.line, structureType);
        }
        else if (/\bwhile\b/.test(trimmedLine)) {
          // Add 'do' if missing
          if (!/(do)\b/.test(trimmedLine)) {
            cm.replaceRange(" do", {line: cursor.line, ch: line.length});
          }
          structureType = "while";
          addEnd = needsEndStatement(cm, cursor.line, structureType);
        }
        else if (/\bfunction\b/.test(trimmedLine) && /\)/.test(trimmedLine)) {
          structureType = "function";
          addEnd = needsEndStatement(cm, cursor.line, structureType);
        }

        // If we need to add an end statement
        if (addEnd) {
          // Let the Enter key event complete first to create a new line
          setTimeout(() => {
            // Get the new cursor position after Enter
            const newCursor = cm.getCursor();

            // Add proper indentation for the end
            const endIndentation = " ".repeat(indentLevel);

            // Insert a newline and an 'end' statement with proper indentation
            cm.replaceRange("\n" + endIndentation + "end", {line: newCursor.line, ch: newCursor.ch});

            // Move cursor back to current position
            cm.setCursor(newCursor);

            // Update line counter after structure completion
            updateLineCounter();
          }, 0);
        }
      }
    });

    // Additional handler for autocomplete hints with manual cursor positioning
    CodeMirror.on(editor, 'hint-shown', function() {
      const popup = document.querySelector('.CodeMirror-hints');
      if (popup) {
        const hints = popup.querySelectorAll('li');
        hints.forEach(hint => {
          hint.addEventListener('click', function() {
            // Handle click on hint - need to position cursor
            setTimeout(() => {
              const cursor = editor.getCursor();
              const line = editor.getLine(cursor.line);

              // Check for function with empty parentheses
              const beforeCursor = line.substring(0, cursor.ch);
              const match = beforeCursor.match(/(\w+)\(\)$/);

              if (match) {
                // Move cursor inside parentheses
                editor.setCursor({
                  line: cursor.line,
                  ch: cursor.ch - 1
                });
              }
            }, 0);
          });
        });
      }
    });

    // Manual handler to catch when dropdown selection is made
    CodeMirror.on(editor.getWrapperElement(), "mouseup", function() {
      // Add a small delay to let the hint selection complete
      setTimeout(() => {
        const cursor = editor.getCursor();
        const line = editor.getLine(cursor.line);

        // Check for function with empty parentheses before the cursor
        const beforeCursor = line.substring(0, cursor.ch);
        const match = beforeCursor.match(/(\w+)\(\)$/);

        if (match) {
          // Move cursor inside parentheses
          editor.setCursor({
            line: cursor.line,
            ch: cursor.ch - 1
          });
        }
      }, 10);
    });

    // Key events for autocompletion trigger
    editor.on('keyup', function(cm, event) {
      // Check for non-control keys to trigger autocompletion
      if (!event.ctrlKey && !event.altKey && !event.metaKey &&
          event.key.length === 1 && /[a-zA-Z0-9_]/.test(event.key)) {

        const word = getWordBeforeCursor(cm);
        if (word && word.length >= 2) { // Show suggestions after typing 2+ chars
          const hint = customHint(cm);
          if (hint && hint.list.length > 0) {
            CodeMirror.showHint(cm, function() { return hint; }, {
              completeSingle: false,
              alignWithWord: true,
              closeOnUnfocus: true
            });
          }
        }
      }
    });

    // Update line counter when cursor moves
    editor.on('cursorActivity', function() {
      updateLineCounter();
    });

    // Update line counter when content changes
    editor.on('change', function() {
      updateLineCounter();
    });

    // Initialize line counter
    updateLineCounter();

    // Get editor content
    function getCode() {
      return editor.getValue();
    }

    // Set editor content
    function setCode(code) {
      editor.setValue(code);
    }

    // Make the editor focus by default
    setTimeout(() => {
      editor.focus();
    }, 100);
  </script>
</body>
</html>
